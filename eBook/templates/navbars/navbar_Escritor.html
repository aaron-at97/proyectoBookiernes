{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
      crossorigin="anonymous">
<link rel="stylesheet" href="{% static 'css/css_InicioBookiernes.css' %}"/>
<link rel="stylesheet" href="{% static 'css/formStyle.css' %}"/>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

    <symbol id="user-icon" viewBox="0 0 1024 1024">
        <path d="m730.06 679.64q-45.377 53.444-101.84 83.443t-120 29.999q-64.032 0-120.75-30.503t-102.6-84.451q-40.335 13.109-77.645 29.747t-53.948 26.722l-17.142 10.084q-29.747 19.159-51.175 57.729t-21.428 73.107 25.461 59.242 60.754 24.705h716.95q35.293 0 60.754-24.705t25.461-59.242-21.428-72.603-51.679-57.225q-6.554-4.033-18.907-10.84t-51.427-24.453-79.409-30.755zm-221.84 25.72q-34.285 0-67.561-14.873t-60.754-40.335-51.175-60.502-40.083-75.124-25.461-84.451-9.075-87.728q0-64.032 19.915-116.22t54.452-85.964 80.67-51.931 99.072-18.151 99.072 18.151 80.67 51.931 54.452 85.964 19.915 116.22q0 65.04-20.167 130.58t-53.948 116.72-81.426 83.443-98.568 32.268z"></path>
    </symbol>

</svg>

<div class="wrap">
    <div class="outer-content-wrapper">
        <div class="container container-submenu visible-xs menu1xs">
            <div class="row">
                <div class="col-xs-12">

                    <div class="submenu-backdrop"></div>
                    <div class="btn-group-inverse">
                        <button type="button" class="btn btn-submenu dropdown-toggle" data-toggle="dropdown">
                            <use></use>
                            <span class="icon-chevron-down"><i class="fa fa-book" aria-hidden="true"></i></span> Mis
                            Libros Subidos
                        </button>
                        <ul class="dropdown-menu" role="menu">
                            <li id="submenu-item-myBooks" class="active">
                                <a href=""><i class="fa fa-book" aria-hidden="true"></i> Mis Libros Subidos </a>
                            </li>

                            <li id="submenu-item-updateBook">
                                <a href=""><i class="fa fa-upload" aria-hidden="true"></i> Subir Libros </a>
                            </li>

                            <li id="salir">
                                <a href=""><i class="fa fa-undo" aria-hidden="true"></i> Salir </a>
                            </li>
                        </ul>
                    </div>

                </div>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="col-md-2 col-sm-3 hidden-xs negro-bg" style="position:  fixed; height:  100%;">
                <div class="sidebar">

                    <div class="user-icon-container img-circle ">
                        <svg class="user-icon">
                            <use xlink:href="#user-icon">
                            </use>
                        </svg>
                    </div>

                    <ul class="nav-inverse nav-tabs nav-stacked">
                        <li id="submenu-item-account-overview" class="active">
                            <a href="{% url 'list_book' %}"><i class="fa fa-book" aria-hidden="true"></i> Mis Libros
                                Subidos </a>
                        </li>

                        <li id="submenu-item-family-plan">
                            <a href="{% url 'book_create' %}"><i class="fa fa-upload" aria-hidden="true"></i> Subir
                                Libros </a>
                        </li>

                        <li id="salir">
                            <a href=""><i class="fa fa-undo" aria-hidden="true"></i> Salir </a>
                        </li>
                    </ul>
                </div>

            </div>

            <div class="col-md-10 col-sm-9 col-md-offset-2 col-sm-offset-3">
                <div class="container-fluid">
                    <div class="page-header">
                        <h1>Bienvenido Escritor</h1>
                    </div>

                    <div class="container-fluid">
                        <div class="album-results">
                            <div class="row" id="poner">
                                {% block content %}
                                {% endblock %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
