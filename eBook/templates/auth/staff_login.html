
{% block titulo %}Iniciar sesión{% endblock %}
{% block cuerpo %}
<div align="center">
    <h2>Iniciar sesión</h2>
    <form action="{% url 'login' %}" method="post">{% csrf_token %}
        <br />
        <b>Usuario</b><br />
        {{ form.username }}
        <br />
        <br />
        <b>Contraseña</b>
        <br />
        {{ form.password }}
        <br />
        <br />
        <button class="btn btn-success" type="submit">Iniciar sesión</button>
    </form>
    <br />

</div>
{% endblock %}
